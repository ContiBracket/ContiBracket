name: Deploy ContiBracket to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Auto-detect frontend dir (handles both root-level and ./frontend layouts)
    steps:
      - uses: actions/checkout@v4

      - name: Locate frontend directory
        id: locate
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "app/frontend/package.json" ]; then
            echo "dir=app/frontend" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find a package.json. Repo structure:" >&2
            ls -la >&2
            exit 1
          fi
          echo "Found frontend at: $(cat $GITHUB_OUTPUT)"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd "${{ steps.locate.outputs.dir }}"
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            echo "No yarn.lock — doing a loose yarn install"
            corepack enable
            yarn install
          fi

      - name: Build
        env:
          CI: false
          PUBLIC_URL: "."
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          REACT_APP_ADMIN_PIN: ${{ secrets.REACT_APP_ADMIN_PIN }}
        run: |
          cd "${{ steps.locate.outputs.dir }}"
          yarn build
          touch build/.nojekyll
          cp build/index.html build/404.html

      - name: Show build output
        run: |
          ls -la "${{ steps.locate.outputs.dir }}/build" | head -20

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.dir }}/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
